[project]
name = "jaxpint"
version = "0.1.0"
description = "JAX-accelerated pulsar timing (port of PINT)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "jax[cpu,cuda13]>=0.4.20",
    "equinox>=0.11.0",
    "pytest>=7.0",
    "jaxtyping>=0.3.9",
    "git-filter-repo>=2.47.0",
    "hypothesis>=6.0",
    "pint-pulsar>=1.0",
    "pytest-xdist>=3.8.0",
    "ipykernel>=7.2.0",
    "blackjax>=1.5",
    "sphinx>=9.1.0",
    "sphinx-copybutton>=0.5.2",
    "pydata-sphinx-theme>=0.17.0",
    "ipympl>=0.10.0",
]

[project.optional-dependencies]
docs = ["sphinx>=7.0", "pydata-sphinx-theme", "sphinx-copybutton"]

[tool.pytest.ini_options]
markers = [
    "slow: marks tests as slow (deselected by default, run with --runslow)",
]
