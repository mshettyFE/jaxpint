# Run the full pytest suite (including @slow PINT-validation tests) and pyright
# static type checking on every push to main and every pull request.
# The suite runs as three parallel path shards (see the `test` job's matrix)
# so each run's wall-clock is setup + the longest shard. No coverage in CI:
# the report was write-only (never uploaded or gated on); run
# `pytest --cov=jaxpint` locally when a coverage read is wanted.
#
# Mirrors the environment conventions from docs.yml: uv for installs,
# --extra cpu (no CUDA wheels on the runner), and JAX_PLATFORMS=cpu so JAX
# never probes for a GPU.
#
# The ruff/pyright/pytest `run:` steps below are mirrored locally by
# tools/check.sh (run it before pushing to catch a red CI early). This workflow
# is the authoritative gate; if the two drift, update whichever is behind.

name: Tests

# When this workflow runs.
#   push to main      -> full suite on the integration branch
#   pull_request      -> full suite as the merge gate
#   workflow_dispatch -> "Run workflow" button to trigger manually
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel an in-flight run when a newer commit is pushed to the same ref.
# Losing a superseded test run is fine -- we only care about the latest
# commit's result.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

# Read-only: the jobs only need to check out the repo.
permissions:
  contents: read

jobs:
  # The complete suite including @slow tests (numerical validation against
  # PINT), split into three parallel shards so PR wall-clock is
  # setup + the longest shard instead of the whole suite (~20 min -> ~10).
  #
  # Shard design: two explicit path groups balanced by measured runtime
  #  plus a "core" shard that runs EVERYTHING ELSE
  # via --ignore-glob of the first two groups' patterns. New test files
  # therefore land in "core" automatically -- nothing is ever silently
  # unsharded. IMPORTANT: the pta/components pattern lists appear twice
  # (positively in their own shard, negatively in core's ignore list); edit
  # both together or a file will run twice / not at all. Rebalance by moving
  # a glob between groups when one shard's time drifts (check the Actions
  # timing view, or locally: pytest <globs> --runslow -q --durations=0).
  test:
    runs-on: ubuntu-latest
    strategy:
      # One red shard shouldn't hide another shard's result.
      fail-fast: false
      matrix:
        include:
          # GW / inference stack: PTA likelihood, marginalization, optimal
          # statistic, frequentist + CW searches, enterprise cross-checks.
          - shard: pta
            paths: >-
              tests/test_pta*.py tests/test_optimal*.py
              tests/test_frequentist*.py tests/test_cw_*.py
              tests/test_bayes*.py tests/test_conditional.py
              tests/test_correlated_gwb.py tests/test_incoherent_ul.py
              tests/test_clogL*.py tests/test_credible_maps.py
              tests/test_stats_*.py tests/enterprise_checks
          # Timing-model components: binaries, noise processes, wideband,
          # solar wind, dispersion -- the PINT-parity-heavy group.
          - shard: components
            paths: >-
              tests/test_binary*.py tests/test_kepler.py
              tests/test_wideband.py tests/test_*noise*.py
              tests/test_solar_wind*.py tests/test_dispersion*.py
              tests/test_glitch.py tests/test_jump.py tests/test_wavex.py
              tests/test_fdjump.py tests/test_fd_chromatic.py
              tests/test_exponential_dip.py tests/test_shapiro.py
              tests/test_spin.py tests/test_spectral_models.py
              tests/test_gwb_basis.py
          # Everything else (bridge, fitters, loaders, par/tim, clock,
          # dual_float, ...): the complement of the two groups above.
          # Keep these ignore patterns in lockstep with the path lists above.
          - shard: core
            paths: >-
              tests/
              --ignore-glob='tests/test_pta*.py'
              --ignore-glob='tests/test_optimal*.py'
              --ignore-glob='tests/test_frequentist*.py'
              --ignore-glob='tests/test_cw_*.py'
              --ignore-glob='tests/test_bayes*.py'
              --ignore=tests/test_conditional.py
              --ignore=tests/test_correlated_gwb.py
              --ignore=tests/test_incoherent_ul.py
              --ignore-glob='tests/test_clogL*.py'
              --ignore=tests/test_credible_maps.py
              --ignore-glob='tests/test_stats_*.py'
              --ignore=tests/enterprise_checks
              --ignore-glob='tests/test_binary*.py'
              --ignore=tests/test_kepler.py
              --ignore=tests/test_wideband.py
              --ignore-glob='tests/test_*noise*.py'
              --ignore-glob='tests/test_solar_wind*.py'
              --ignore-glob='tests/test_dispersion*.py'
              --ignore=tests/test_glitch.py
              --ignore=tests/test_jump.py
              --ignore=tests/test_wavex.py
              --ignore=tests/test_fdjump.py
              --ignore=tests/test_fd_chromatic.py
              --ignore=tests/test_exponential_dip.py
              --ignore=tests/test_shapiro.py
              --ignore=tests/test_spin.py
              --ignore=tests/test_spectral_models.py
              --ignore=tests/test_gwb_basis.py
    name: test (${{ matrix.shard }})
    steps:
      - uses: actions/checkout@v4

      # Install + cache uv, keyed on uv.lock (same as docs.yml).
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # --extra cpu  -> jax[cpu]
      # --extra dev  -> pytest, pytest-xdist, hypothesis, pint, etc.
      #   (dev already pulls in [docs], [skymap], [pint], so the bridge and
      #   skymap-dependent tests can import their optional deps.)
      - name: Install dependencies
        run: uv sync --extra cpu --extra dev

      # Pin the clock snapshot to the seed commit the suite is tested against
      # (jaxpint.clock._pinned.SEED_CLOCK_REF -- the single source of truth,
      # bumped via tools/bump_clock_pin.py). Exporting JAXPINT_CLOCK_REF makes
      # the clock subsystem skip the GitHub *API* HEAD lookup entirely (that
      # endpoint is the 60-req/hr bottleneck), so it only ever fetches raw files
      # for a fixed ref -- deterministic and rate-limit-safe. Derived at runtime
      # rather than hardcoded here so bumping the pin needs no workflow edit.
      - name: Pin clock ref to the tested seed commit
        run: |
          REF=$(uv run --extra cpu --extra dev \
            python -c "from jaxpint.clock._pinned import SEED_CLOCK_REF; print(SEED_CLOCK_REF)")
          echo "JAXPINT_CLOCK_REF=$REF" >> "$GITHUB_ENV"
          echo "Pinned JAXPINT_CLOCK_REF=$REF"

      # Warm the pinned clock snapshot ONCE, serially, before the parallel run.
      # Without this, every `-n auto` xdist worker cold-downloads the whole
      # snapshot into the shared package dir at once and races on the download
      # temp files. One serial pre-fetch leaves a warm SNAPSHOT.json at the
      # pinned ref, so the workers make zero network calls.
      - name: Pre-warm clock snapshot cache
        env:
          JAX_PLATFORMS: cpu
        run: >-
          uv run --extra cpu --extra dev
          python -c "import jaxpint.clock as clock; clock.ensure_fresh()"

      # The bridge / PINT-parity tests build real PINT models + TOAs, which pull
      # PINT's OWN clock corrections (a separate machinery from jaxpint's, into
      # the Astropy cache). Two distinct problems, two fixes:
      #   * Rate-limit (HTTP 429 / missing default TT(BIPM2023)) -- warmed HERE.
      #     update_clock_files is PINT's supported pre-load hook (see its
      #     docstring); one serial fetch into the shared $HOME Astropy cache means
      #     the `-n auto` workers reuse it instead of storming the repo.
      #   * DRIFT -- PINT tracks the clock repo's moving `main` HEAD while jaxpint
      #     pins SEED_CLOCK_REF. That is handled in conftest.py, which points
      #     $PINT_CLOCK_OVERRIDE at jaxpint's pinned snapshot (see
      #     jaxpint.bridge.set_pint_clock_override) so PINT uses identical bytes.
      #     The override does NOT stop PINT's download (find_clock_file builds the
      #     global file eagerly), which is exactly why this pre-warm is still needed.
      # NOTE: update_clock_files(bipm_versions=[...]) is broken in PINT >= 1.1.4
      # (still on master as of 2026-07): it calls o._load_bipm_clock(v) on a
      # TopoObs, but those loaders were refactored into module-level functions
      # (pint/observatory/__init__.py), so passing bipm_versions raises
      # AttributeError. Call the module-level loaders directly, then run
      # update_clock_files() WITHOUT bipm_versions (that path is fine) for the
      # per-observatory clock files.
      - name: Pre-warm PINT clock cache
        env:
          JAX_PLATFORMS: cpu
        run: |
          uv run --extra cpu --extra dev python - <<'EOF'
          import pint.observatory as o
          for v in ["BIPM2023", "BIPM2019"]:
              o._load_bipm_clock(v)
          o._load_gps_clock()
          o.update_clock_files()
          EOF

      # --runslow -> include the @slow PINT-validation / fitting / noise tests.
      # -n auto   -> parallelize across the runner's cores via pytest-xdist.
      # --dist worksteal -> rebalance test items as workers free up, so the
      #   long tail (20s PTA-marg tests etc.) doesn't strand idle workers.
      # HYPOTHESIS_PROFILE=ci -> deterministic seeds + reproduction blobs on
      #   failure (see conftest.py). JAX_PLATFORMS=cpu keeps JAX off the GPU.
      # The --extra flags are repeated on `uv run` (not just `uv sync` above):
      # a bare `uv run` re-syncs to the default deps and would uninstall the
      # dev extra (pytest), so the extras must be named here too.
      # No --cov: instrumentation taxes every shard 10-20% for a report that
      # was never uploaded or gated on. Run `pytest --cov=jaxpint` locally.
      - name: Run test shard
        env:
          JAX_PLATFORMS: cpu
          HYPOTHESIS_PROFILE: ci
        run: >-
          uv run --extra cpu --extra dev pytest --runslow -n auto
          --dist worksteal ${{ matrix.paths }}

  # Static type checking (pyright). Fast, so it gates PRs alongside the suite.
  # Scope and per-rule severities live in [tool.pyright] in pyproject.toml
  # (library + examples + scripts at error level; tests' type-flow rules relaxed).
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # pyright needs the deps installed to resolve imports (jax, astropy, pint).
      # --extra dev pulls in pyright itself (+ pint for the bridge modules);
      # --extra cpu provides jax[cpu]. Extras repeated on `uv run` (see above).
      - name: Install dependencies
        run: uv sync --extra cpu --extra dev

      - name: Run pyright
        run: uv run --extra cpu --extra dev pyright

  # Lint (ruff). Static and fast; gates PRs alongside the suite. Rules and scope
  # live in [tool.ruff] in pyproject.toml (notebooks excluded; tests linted but not
  # formatted). The format check (`ruff format --check`) skips tests and notebooks.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra cpu --extra dev

      - name: Run ruff
        run: uv run --extra cpu --extra dev ruff check

      # Fail on unformatted code, so formatting drift can't accumulate from
      # contributors who haven't installed the (local, opt-in) pre-commit hooks.
      - name: Run ruff format check
        run: uv run --extra cpu --extra dev ruff format --check
